<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVI PILATES 線上預約</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap');

        :root {
            --primary-color: #BCA39B; 
            --dark-accent: #8C736D; 
            --bg-color: #F8F5F2; 
            --text-color: #4A4A4A;
            --card-bg: #FFFFFF;
            --danger-color: #D98989; 
            --success-color: #7DA28D;
        }

        body { font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        #app-container { width: 100%; max-width: 500px; background-color: var(--bg-color); min-height: 100vh; position: relative; overflow-x: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.03); }
        .hero-banner { background: linear-gradient(145deg, #F3EBE6 0%, #E8DCD6 100%); padding: 80px 20px 50px; text-align: center; position: relative; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 700; color: var(--dark-accent); margin: 0; line-height: 1; letter-spacing: 4px; }
        .hero-subtitle { font-family: 'Playfair Display', serif; font-size: 46px; font-style: italic; font-weight: 500; color: var(--dark-accent); margin: 5px 0 25px; }
        .hero-divider { width: 60%; height: 1px; background-color: rgba(140, 115, 109, 0.3); margin: 0 auto 20px; position: relative; }
        .hero-divider::after { content: "ooo"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #EBDED8; padding: 0 10px; font-size: 10px; color: var(--dark-accent); letter-spacing: 2px; }
        .hero-tagline { font-family: 'Playfair Display', serif; font-size: 16px; letter-spacing: 2px; color: var(--dark-accent); margin-top: 25px; }

        .content-area { padding: 0 20px 30px; margin-top: -30px; position: relative; z-index: 10; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(140, 115, 109, 0.08); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text-color); margin: 0 0 10px 0; }
        .card-subtitle { font-size: 14px; color: #888; margin: 0 0 20px 0; }

        .mode-switcher { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .mode-btn { flex: 1; min-width: 45%; padding: 12px 5px; border: 1px solid var(--primary-color); background: transparent; color: var(--primary-color); border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: var(--primary-color); color: white; box-shadow: 0 4px 10px rgba(188, 163, 155, 0.4); }
        .mode-hint { font-size: 12px; color: var(--danger-color); text-align: center; margin-bottom: 15px; display: none; background: #fff5f5; padding: 8px; border-radius: 6px; }
        
        /* 補課專用按鈕 */
        #btn-makeup { display: none; border-color: var(--success-color); color: var(--success-color); }
        #btn-makeup.active { background: var(--success-color); color: white; box-shadow: 0 4px 10px rgba(125, 162, 141, 0.4); }

        .view-bookings-btn { width: 100%; padding: 15px; background-color: transparent; border: 1px dashed var(--primary-color); color: var(--dark-accent); border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .view-bookings-btn:hover { background-color: rgba(188, 163, 155, 0.1); }

        #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; color: var(--dark-accent); font-weight: bold; font-size: 16px; }
        .spinner-icon { width: 40px; height: 40px; margin-bottom: 10px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sub-page-container { padding: 30px 20px; } 

        .month-navigation { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .nav-btn { background: none; border: none; font-size: 18px; color: var(--dark-accent); cursor: pointer; padding: 5px 10px; transition: 0.3s; }
        .nav-btn:disabled { color: #ddd; cursor: not-allowed; }
        .current-month-label { font-size: 18px; font-weight: bold; color: var(--text-color); font-family: 'Playfair Display', serif; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .weekday { font-size: 12px; color: #aaa; margin-bottom: 8px; font-weight: normal; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; cursor: pointer; background-color: transparent; font-size: 15px; font-weight: 500; transition: all 0.2s ease; }
        .day-cell.empty { cursor: default; }
        .day-cell:hover:not(.empty):not(.full):not(.past) { background-color: var(--primary-color); color: white; transform: scale(1.05); box-shadow: 0 4px 12px rgba(188, 163, 155, 0.4); }
        
        /* 補課模式的日曆懸停顏色 */
        .mode-makeup-active .day-cell:hover:not(.empty):not(.full):not(.past) { background-color: var(--success-color); box-shadow: 0 4px 12px rgba(125, 162, 141, 0.4); }

        .day-cell.full { color: #ccc; cursor: not-allowed; text-decoration: line-through; }
        .day-cell.past { color: #e0e0e0; cursor: not-allowed; }
        .availability { font-size: 10px; margin-top: 2px; color: var(--primary-color); }
        .mode-makeup-active .availability { color: var(--success-color); }
        .day-cell:hover:not(.empty):not(.full):not(.past) .availability { color: rgba(255,255,255,0.9); }
        .status-text { font-size: 10px; margin-top: 2px; }
        
        #time-slots-container { margin-top: 20px; }
        .time-slot-btn { width: 100%; padding: 16px; margin-bottom: 12px; background-color: transparent; border: 1px solid var(--primary-color); color: var(--dark-accent); border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .time-slot-btn:hover:not(:disabled) { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .time-slot-btn:disabled { cursor: not-allowed; border-color: #eee; color: #bbb; background-color: #fafafa; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #555; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 15px; background-color: #fcfcfc; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary-color); background-color: white; }
        textarea { resize: vertical; height: 100px; }
        button.submit-btn { width: 100%; padding: 18px; background-color: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 16px rgba(188, 163, 155, 0.3); }
        button.submit-btn:hover { background-color: var(--dark-accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-btn { background: none; border: none; color: #888; cursor: pointer; padding: 0; margin-bottom: 25px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .success-icon { text-align: center; margin-bottom: 10px; }
        .success-title { text-align: center; font-size: 26px; font-family: 'Playfair Display', serif; color: var(--dark-accent); margin-bottom: 25px; }
        .info-card { background-color: #fbfbfb; padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #eee; }
        .info-row { display: flex; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .info-label { width: 80px; color: #888; font-size: 14px; }
        .info-value { flex: 1; font-weight: bold; color: #444; text-align: right; }

        .booking-item { background: white; border: 1px solid #eee; padding: 15px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        .booking-header { display: flex; justify-content: space-between; align-items: center;}
        .booking-mode-tag { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .tag-single { background-color: #eee; color: #666; }
        .tag-bimonthly { background-color: var(--primary-color); color: white; }
        .tag-makeup { background-color: var(--success-color); color: white; }
        .booking-date { font-weight: bold; color: var(--dark-accent); font-size: 16px;}
        .booking-time { color: #666; font-size: 14px; margin-top: 4px;}
        .empty-bookings { text-align: center; color: #999; padding: 40px 0; font-size: 15px; }
        
        .action-btns-row { display: flex; gap: 8px; margin-top: 10px; }
        .leave-btn { background: none; border: 1px solid #eee; color: #f39c12; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .leave-btn:hover { background-color: #fffaf0; border-color: #f39c12; }
        .delete-booking-btn { background: none; border: 1px solid #eee; color: var(--danger-color); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .delete-booking-btn:hover { background-color: #fff5f5; border-color: var(--danger-color); }
        .details-btn { background: none; border: none; color: var(--primary-color); font-size: 12px; padding: 0; margin-top: 10px; cursor: pointer; text-decoration: underline; }
        .details-content { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; font-size: 13px; color: #666; line-height: 1.6; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

        .footer-logo-container { text-align: center; padding: 40px 30px 60px; background-color: var(--bg-color); position: relative; }
        .studio-logo-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .footer-icon { width: 40px; height: 40px; margin-bottom: 15px; stroke: var(--dark-accent); }
        .footer-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--dark-accent); line-height: 1.6; margin: 0; }
        .footer-author { font-size: 12px; color: #A8958F; margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="loading-overlay">
        <svg class="spinner-icon" viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 25c0 0 10-15 15-15s15 15 15 15-10 15-15 15-15-15-15-15z" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="25" cy="25" r="4" stroke-width="3"/>
            <path d="M25 40a15 15 0 0 1 0-30m0 30a15 15 0 0 0 0-30"/>
        </svg>
        <span id="loading-text">載入中...</span>
    </div>

    <div id="page-home" class="page active">
        <div class="hero-banner">
            <h1 class="hero-title">VIVI</h1>
            <div class="hero-subtitle">Pilates</div>
            <div class="hero-divider"></div>
            <div class="hero-tagline">Move better, feel better, live better</div>
        </div>

        <div class="content-area">
            <div class="card">
                <h2 class="card-title">Book a Session</h2>
                <div class="mode-switcher">
                    <button id="btn-single" class="mode-btn active" onclick="setMode('single')">單堂預約</button>
                    <button id="btn-bimonthly" class="mode-btn" onclick="setMode('bimonthly')">雙月預約</button>
                    <button id="btn-makeup" class="mode-btn" onclick="setMode('makeup')">使用補課額度</button>
                </div>
                <div id="bimonthly-hint" class="mode-hint">雙月限定：單數月的第一週 (限週一/二)</div>
                <div id="makeup-hint" class="mode-hint" style="color:var(--success-color); background:#f0f7f3; display:none;">
                    您有 <span id="credit-count" style="font-weight:bold;">0</span> 堂補課額度可用
                </div>
                
                <button class="view-bookings-btn" onclick="showMyBookings()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    View My Bookings
                </button>
            </div>

            <div class="card">
                <div class="month-navigation">
                    <button class="nav-btn" id="prev-month-btn" onclick="changeMonth(-1)">&#10094;</button>
                    <div class="current-month-label" id="month-label"></div>
                    <button class="nav-btn" onclick="changeMonth(1)">&#10095;</button>
                </div>
                <div id="calendar-container"></div>
            </div>
        </div>

        <div class="footer-logo-container">
            <div class="studio-logo-wrapper">
                <svg class="footer-icon" viewBox="0 0 30 30" fill="none" stroke-width="1.5">
                    <path d="M22.5 15c0-1.5-1.5-2.5-2.5-2.5s-2.5 1-2.5 2.5 1 2.5 2.5 2.5 2.5-1 2.5-2.5zM20 12.5a5.5 5.5 0 0 1 0-7M20 17.5a5.5 5.5 0 0 0 0 7M15 12.5s-2.5-2.5-5-2.5S5 12.5 5 15s2.5 2.5 5 2.5 5-2.5 5-2.5M10 12.5a5.5 5.5 0 0 1 0-7M10 17.5a5.5 5.5 0 0 0 0 7"/>
                </svg>
                <p class="footer-quote">"Physical fitness is the first requisite of happiness."</p>
                <div class="footer-author">- Joseph Pilates</div>
            </div>
        </div>
    </div>

    <div id="page-my-bookings" class="page">
        <div class="sub-page-container">
            <button class="back-btn" onclick="goToPage('page-home')">← 返回首頁</button>
            <h2 class="card-title" style="margin-bottom: 25px;">My Bookings</h2>
            <div id="my-bookings-list"></div>
        </div>
    </div>

    <div id="page-time" class="page">
        <div class="sub-page-container">
            <button class="back-btn" onclick="goToPage('page-home')">← 返回日曆</button>
            <h2 class="card-title">Select Time</h2>
            <p class="card-subtitle" id="time-display-date" style="margin-bottom: 25px;"></p>
            <div id="time-slots-container"></div>
        </div>
    </div>

    <div id="page-form" class="page">
        <div class="sub-page-container">
            <button class="back-btn" onclick="goToPage('page-time')">← 返回時段</button>
            <h2 class="card-title">Your Details</h2>
            <div class="info-card" style="padding: 15px 20px; margin-bottom: 20px;">
                <span id="display-mode" style="font-size: 12px; font-weight: bold; color: var(--primary-color);"></span><br>
                <span id="display-date" style="color: #666; font-size: 14px;"></span><br>
                <span id="display-time" style="color: var(--dark-accent); font-weight: bold; font-size: 18px;"></span>
            </div>

            <form id="booking-form" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label for="name">姓名 Name</label>
                    <input type="text" id="name" required placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label for="phone">電話 Phone</label>
                    <input type="tel" id="phone" required placeholder="請輸入電話">
                </div>
                <div class="form-group">
                    <label for="email">電子信箱 Email (接收提醒用)</label>
                    <input type="email" id="email" required placeholder="請輸入 Email">
                </div>
                <div class="form-group">
                    <label for="notes">備註 Notes</label>
                    <textarea id="notes" placeholder="有無特殊身體狀況或其他需求..."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">確認預約 Confirm</button>
            </form>
        </div>
    </div>

    <div id="page-success" class="page">
        <div class="sub-page-container" style="padding-top: 60px;">
            <div class="success-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <div class="success-title">Booked!</div>
            <p style="text-align: center; color: #888; margin-bottom: 30px;">您的預約已成功送出，期待見到您。</p>
            
            <div class="info-card">
                <div class="info-row"><div class="info-label">方案</div><div class="info-value" id="result-mode"></div></div>
                <div class="info-row"><div class="info-label">日期</div><div class="info-value" id="result-date" style="font-size: 12px; line-height:1.4;"></div></div>
                <div class="info-row"><div class="info-label">時間</div><div class="info-value" id="result-time"></div></div>
                <div class="info-row"><div class="info-label">姓名</div><div class="info-value" id="result-name"></div></div>
            </div>

            <button class="submit-btn" onclick="finishBooking()">返回首頁 Home</button>
        </div>
    </div>
</div>

<script>
    // ！！！！請務必確認這裡是您最新的 Google Web App 網址！！！！
    const API_URL = "https://script.google.com/macros/s/AKfycbwNW4YYWpuJezwaINSOB0agY4V6dbtNp4e01J5MNdZo6cWwthk1ieV8m2ja867C5v-hrQ/exec";
    const MAX_PEOPLE = 4;

    const SCHEDULE = {
        1: [{start: "06:30", end: "07:25"}, {start: "07:35", end: "08:30"}, {start: "08:45", end: "09:40"}], 
        2: [{start: "07:50", end: "08:45"}, {start: "09:00", end: "09:55"}],
        3: [], 4: [], 5: [], 6: [], 0: [] 
    };

    let currentMode = 'single'; // 'single', 'bimonthly', 'makeup'
    let selectedDateStr = "";      
    let selectedDayOfWeek = 0;     
    let selectedDatesArray = [];   
    let selectedTimeLabel = "";    
    let cloudBookingData = {};     

    const realToday = new Date();
    let currentRenderYear = realToday.getFullYear();
    let currentRenderMonth = realToday.getMonth(); 

    function showLoading(text) {
        document.getElementById('loading-text').innerText = text;
        document.getElementById('loading-overlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function goToPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0, 0); 
    }

    function checkMakeUpCredits() {
        let credits = parseInt(localStorage.getItem('vivi_makeup_credits')) || 0;
        const makeupBtn = document.getElementById('btn-makeup');
        const makeupHint = document.getElementById('makeup-hint');
        const creditCount = document.getElementById('credit-count');
        
        if (credits > 0) {
            makeupBtn.style.display = 'block';
            creditCount.innerText = credits;
            if (currentMode === 'makeup') makeupHint.style.display = 'block';
        } else {
            makeupBtn.style.display = 'none';
            makeupHint.style.display = 'none';
            if (currentMode === 'makeup') setMode('single'); 
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-single').className = mode === 'single' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-bimonthly').className = mode === 'bimonthly' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-makeup').className = mode === 'makeup' ? 'mode-btn active' : 'mode-btn';
        
        document.getElementById('bimonthly-hint').style.display = mode === 'bimonthly' ? 'block' : 'none';
        
        const appContainer = document.getElementById('app-container');
        if (mode === 'makeup') {
            document.getElementById('makeup-hint').style.display = 'block';
            appContainer.classList.add('mode-makeup-active');
        } else {
            document.getElementById('makeup-hint').style.display = 'none';
            appContainer.classList.remove('mode-makeup-active');
        }
        renderCalendar(); 
    }

    async function fetchBookings() {
        showLoading("連線至伺服器...");
        try {
            const response = await fetch(API_URL + "?t=" + new Date().getTime());
            cloudBookingData = await response.json();
            checkMakeUpCredits();
            renderCalendar(); 
        } catch (error) {
            console.error(error);
        } finally {
            hideLoading();
        }
    }

    function changeMonth(direction) {
        currentRenderMonth += direction;
        if (currentRenderMonth > 11) {
            currentRenderMonth = 0;
            currentRenderYear++;
        } else if (currentRenderMonth < 0) {
            currentRenderMonth = 11;
            currentRenderYear--;
        }
        renderCalendar();
    }

    function renderCalendar() {
        const container = document.getElementById('calendar-container');
        container.innerHTML = ''; 
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

        document.getElementById('month-label').innerText = `${currentRenderYear}年 ${currentRenderMonth + 1}月`;

        const prevBtn = document.getElementById('prev-month-btn');
        if (currentRenderYear === realToday.getFullYear() && currentRenderMonth === realToday.getMonth()) {
            prevBtn.disabled = true;
        } else {
            prevBtn.disabled = false;
        }

        const grid = document.createElement('div');
        grid.className = 'calendar-grid';

        weekdays.forEach(day => {
            const dayEl = document.createElement('div');
            dayEl.className = 'weekday';
            dayEl.innerText = day;
            grid.appendChild(dayEl);
        });

        const firstDay = new Date(currentRenderYear, currentRenderMonth, 1).getDay();
        const daysInMonth = new Date(currentRenderYear, currentRenderMonth + 1, 0).getDate();
        const isOddMonth = (currentRenderMonth % 2 === 0);

        for (let j = 0; j < firstDay; j++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            const dateKey = `${currentRenderYear}-${String(currentRenderMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            const isPastDate = (currentRenderYear === realToday.getFullYear() && currentRenderMonth === realToday.getMonth() && day < realToday.getDate());
            const dayOfWeek = new Date(currentRenderYear, currentRenderMonth, day).getDay();
            const slotsForDay = SCHEDULE[dayOfWeek];

            const isFirstWeek = (day >= 1 && day <= 7);
            const isMonOrTue = (dayOfWeek === 1 || dayOfWeek === 2);

            if (slotsForDay.length === 0) {
                cell.className = 'day-cell past';
                cell.innerHTML = `${day}<div class="status-text">休館</div>`;
            } else if (isPastDate) {
                cell.className = 'day-cell past';
                cell.innerHTML = `${day}`;
            } else if (currentMode === 'bimonthly' && (!isOddMonth || !isFirstWeek || !isMonOrTue)) {
                cell.className = 'day-cell past';
                cell.innerHTML = `${day}<div class="status-text" style="font-size:9px;">不開放</div>`;
            } else {
                cell.className = 'day-cell';
                cell.innerHTML = `${day}<div class="availability">●</div>`;
                cell.onclick = () => selectDate(dateKey, currentRenderYear, currentRenderMonth, day, dayOfWeek);
            }
            grid.appendChild(cell);
        }
        container.appendChild(grid);
    }

    function getDatesForMode(startYear, startMonthIdx, startDay, dayOfWeek) {
        let dates = [];
        if (currentMode === 'single' || currentMode === 'makeup') {
            dates.push(`${startYear}-${String(startMonthIdx + 1).padStart(2, '0')}-${String(startDay).padStart(2, '0')}`);
            return dates;
        }
        
        for (let m = 0; m < 2; m++) {
            let y = startYear;
            let mm = startMonthIdx + m;
            if (mm > 11) { mm -= 12; y++; }
            let daysInM = new Date(y, mm + 1, 0).getDate();
            
            for (let d = 1; d <= daysInM; d++) {
                let dDate = new Date(y, mm, d);
                if (dDate.getDay() === dayOfWeek) {
                    if (m === 0 && d < startDay) continue; 
                    dates.push(`${y}-${String(mm + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
                }
            }
        }
        return dates;
    }

    function selectDate(dateKey, year, monthIdx, day, dayOfWeek) {
        selectedDateStr = dateKey;
        selectedDayOfWeek = dayOfWeek;
        selectedDatesArray = getDatesForMode(year, monthIdx, day, dayOfWeek);

        let displayModeText = '【單堂預約】';
        if (currentMode === 'bimonthly') displayModeText = '【雙月預約】';
        if (currentMode === 'makeup') displayModeText = '【單堂補課】';
        
        document.getElementById('time-display-date').innerText = `${displayModeText}\n起始日：${year}年 ${monthIdx + 1}月 ${day}日`;
        renderTimeSlots();
        goToPage('page-time');
    }

    function renderTimeSlots() {
        const container = document.getElementById('time-slots-container');
        container.innerHTML = '';
        const slots = SCHEDULE[selectedDayOfWeek];
        
        const today = new Date();
        const isToday = (selectedDateStr === `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`);
        const currentHour = today.getHours();

        slots.forEach(slot => {
            const timeLabel = `${slot.start} - ${slot.end}`;
            
            let maxBooked = 0;
            selectedDatesArray.forEach(d => {
                let dateKey = `${d}_${slot.start}`;
                let booked = cloudBookingData[dateKey] || 0;
                if (booked > maxBooked) maxBooked = booked;
            });
            
            const remaining = MAX_PEOPLE - maxBooked;
            const isPastTime = (isToday && parseInt(slot.start.split(":")[0]) <= currentHour); 

            const btn = document.createElement('button');
            btn.className = 'time-slot-btn';
            
            if (isPastTime) {
                btn.disabled = true;
                btn.innerText = `${timeLabel} (已結束)`;
            } else if (remaining <= 0) {
                btn.disabled = true;
                btn.innerText = `${timeLabel} (已額滿)`;
            } else {
                btn.innerText = `${timeLabel} (剩 ${remaining} 位)`;
                if(currentMode === 'makeup') {
                    btn.style.color = 'var(--success-color)';
                    btn.style.borderColor = 'var(--success-color)';
                }
                btn.onclick = () => selectTime(slot.start, timeLabel);
            }
            container.appendChild(btn);
        });
    }

    function selectTime(startTime, timeLabel) {
        selectedTimeLabel = timeLabel;
        const finalDateKeys = selectedDatesArray.map(d => `${d}_${startTime}`);
        
        let modeDisplay = '方案：單堂預約';
        if (currentMode === 'bimonthly') modeDisplay = '方案：雙月預約';
        if (currentMode === 'makeup') modeDisplay = '方案：補課使用';
        
        document.getElementById('display-mode').innerText = modeDisplay;
        
        if (currentMode === 'bimonthly') {
            document.getElementById('display-date').innerHTML = `包含日期：<br>` + finalDateKeys.map(k => k.split('_')[0]).join(', ');
        } else {
            document.getElementById('display-date').innerText = `日期：` + finalDateKeys[0].split('_')[0];
        }
        
        document.getElementById('display-mode').style.color = currentMode === 'makeup' ? 'var(--success-color)' : 'var(--primary-color)';
        document.getElementById('display-time').innerText = timeLabel;
        
        document.getElementById('booking-form').dataset.keys = JSON.stringify(finalDateKeys);
        document.getElementById('booking-form').reset();
        goToPage('page-form');
    }

    async function submitForm(event) {
        event.preventDefault(); 
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        showLoading("處理中，請稍候...");

        const finalDateKeys = JSON.parse(document.getElementById('booking-form').dataset.keys);
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        const payload = {
            action: 'book',
            mode: currentMode,
            dates: finalDateKeys, 
            name: name,
            phone: document.getElementById('phone').value,
            email: email, 
            notes: document.getElementById('notes').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const resData = await response.json();
            const bookingId = resData.id; 

            if (currentMode === 'makeup') {
                let credits = parseInt(localStorage.getItem('vivi_makeup_credits')) || 0;
                localStorage.setItem('vivi_makeup_credits', Math.max(0, credits - 1));
            }

            let myBookings = JSON.parse(localStorage.getItem('vivi_my_bookings')) || [];
            let displayDateText = "";
            if (currentMode === 'single' || currentMode === 'makeup') {
                displayDateText = finalDateKeys[0].split('_')[0];
            } else {
                let m1 = parseInt(finalDateKeys[0].split('-')[1]);
                let m2 = m1 + 1 > 12 ? 1 : m1 + 1;
                displayDateText = `${finalDateKeys[0].split('_')[0]} 起 (${m1}-${m2}月)`;
            }

            myBookings.push({
                uid: bookingId, 
                mode: currentMode,
                dateText: displayDateText,
                datesArray: finalDateKeys, 
                timeText: selectedTimeLabel,
                timestamp: new Date().getTime()
            });
            myBookings.sort((a, b) => b.timestamp - a.timestamp);
            localStorage.setItem('vivi_my_bookings', JSON.stringify(myBookings));

            let finalModeText = '單堂預約';
            if (currentMode === 'bimonthly') finalModeText = '雙月預約';
            if (currentMode === 'makeup') finalModeText = '單堂補課';

            document.getElementById('result-mode').innerText = finalModeText;
            document.getElementById('result-date').innerText = displayDateText;
            document.getElementById('result-time').innerText = selectedTimeLabel;
            document.getElementById('result-name').innerText = name;

            goToPage('page-success');
        } catch (error) {
            alert("預約失敗，請稍後再試。");
            console.error(error);
        } finally {
            hideLoading();
            btn.disabled = false;
        }
    }

    function finishBooking() {
        fetchBookings();
        if (currentMode === 'makeup') setMode('single');
        goToPage('page-home');
    }

    function showMyBookings() {
        const container = document.getElementById('my-bookings-list');
        container.innerHTML = '';
        
        let myBookings = JSON.parse(localStorage.getItem('vivi_my_bookings')) || [];
        
        if (myBookings.length === 0) {
            container.innerHTML = '<div class="empty-bookings">您目前尚無預約紀錄</div>';
        } else {
            myBookings.forEach(booking => {
                const isBimonthly = booking.mode === 'bimonthly';
                const isMakeup = booking.mode === 'makeup';
                
                let tagClass = 'tag-single';
                let tagText = '單堂';
                if (isBimonthly) { tagClass = 'tag-bimonthly'; tagText = '雙月預約'; }
                if (isMakeup) { tagClass = 'tag-makeup'; tagText = '補課'; }
                
                let detailsHtml = "";
                if (isBimonthly && booking.datesArray) {
                    let datesListHtml = booking.datesArray.map(k => {
                        let shortDate = k.split('_')[0];
                        return `
                        <div class="detail-row">
                            <span>${shortDate}</span>
                            <button class="leave-btn" onclick="requestLeave(${booking.timestamp}, '${booking.uid}', '${k}')">請假</button>
                        </div>`;
                    }).join('');

                    detailsHtml = `
                        <button class="details-btn" onclick="const p = this.nextElementSibling; p.style.display = p.style.display === 'none' ? 'block' : 'none'; this.innerText = p.style.display === 'none' ? '詳細日期 ▼' : '隱藏日期 ▲';">詳細日期 ▼</button>
                        <div class="details-content">${datesListHtml}</div>
                    `;
                }

                const safeUid = booking.uid || ""; 
                const div = document.createElement('div');
                div.className = 'booking-item';
                
                // 【修改】：加入傳遞 mode 參數給 deleteFullBooking
                div.innerHTML = `
                    <div style="flex:1;">
                        <div class="booking-header">
                            <span class="booking-mode-tag ${tagClass}">${tagText}</span>
                        </div>
                        <div class="booking-date">${booking.dateText}</div>
                        <div class="booking-time">${booking.timeText}</div>
                        ${detailsHtml}
                    </div>
                    <button class="delete-booking-btn" onclick="deleteFullBooking(${booking.timestamp}, '${safeUid}', '${booking.mode}')" style="align-self: flex-start;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        取消
                    </button>
                `;
                container.appendChild(div);
            });
        }
        goToPage('page-my-bookings');
    }

    async function requestLeave(timestamp, uid, dateKeyToLeave) {
        if(confirm(`確定要針對 ${dateKeyToLeave.split('_')[0]} 請假嗎？\n\n系統將會釋出該日名額，並發放 1 堂「補課額度」給您。`)) {
            showLoading("處理請假中...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'leave', id: uid, leaveDate: dateKeyToLeave })
                });

                let myBookings = JSON.parse(localStorage.getItem('vivi_my_bookings')) || [];
                let targetBooking = myBookings.find(b => b.timestamp === timestamp);
                if (targetBooking) {
                    targetBooking.datesArray = targetBooking.datesArray.filter(d => d !== dateKeyToLeave);
                }
                localStorage.setItem('vivi_my_bookings', JSON.stringify(myBookings));

                let credits = parseInt(localStorage.getItem('vivi_makeup_credits')) || 0;
                localStorage.setItem('vivi_makeup_credits', credits + 1);

                showMyBookings(); 
                fetchBookings();  
                alert("請假成功！您已獲得 1 堂補課額度。");
            } catch (error) {
                alert("請假失敗，請確認網路連線。");
                console.error(error);
            } finally {
                hideLoading();
            }
        }
    }

    // 【修改】：加入 mode 判斷，若取消補課則退還額度
    async function deleteFullBooking(timestamp, uid, mode) {
        if (!uid) { alert("此為舊紀錄，無法線上取消，請聯絡老師！"); return; }

        if(confirm("確定要取消這筆預約嗎？\n\n這將會同步釋出雲端試算表上的名額供其他人預約！")) {
            showLoading("正在取消預約...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id: uid })
                });

                let myBookings = JSON.parse(localStorage.getItem('vivi_my_bookings')) || [];
                myBookings = myBookings.filter(b => b.timestamp !== timestamp);
                localStorage.setItem('vivi_my_bookings', JSON.stringify(myBookings));
                
                // 【核心修改】：若取消的是「單堂補課」，自動退還 1 堂額度
                if (mode === 'makeup') {
                    let credits = parseInt(localStorage.getItem('vivi_makeup_credits')) || 0;
                    localStorage.setItem('vivi_makeup_credits', credits + 1);
                    alert("補課取消成功！已退還 1 堂補課額度。");
                }

                showMyBookings(); 
                fetchBookings();  
            } catch (error) {
                alert("取消失敗，請確認網路連線。");
            } finally {
                hideLoading();
            }
        }
    }

    window.onload = () => {
        checkMakeUpCredits();
        renderCalendar(); 
        fetchBookings();
    };
</script>
