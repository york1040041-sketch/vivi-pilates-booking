<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVI PILATES 線上預約</title>
    <style>
        :root {
            --primary-color: #D4B8B1; 
            --bg-color: #FAF8F5;
            --text-color: #333;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            overflow-x: hidden;
        }

        @media (min-width: 600px) {
            #app-container {
                min-height: 80vh;
                margin: 40px 0;
                border-radius: 12px;
            }
        }

        /* 載入中遮罩 */
        #loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-size: 12px; color: #888; margin-bottom: 5px; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; cursor: pointer; background-color: #f9f9f9; font-size: 14px; transition: 0.2s; }
        .day-cell.empty { background-color: transparent; cursor: default; }
        .day-cell:hover:not(.empty):not(.full):not(.past) { background-color: var(--primary-color); color: white; }
        .day-cell.full { background-color: #eee; color: #aaa; cursor: not-allowed; }
        .day-cell.past { background-color: #f1f1f1; color: #ccc; cursor: not-allowed; }
        .availability { font-size: 10px; margin-top: 2px; color: #666; }
        .day-cell:hover:not(.empty):not(.full):not(.past) .availability { color: white; }
        .status-text { font-size: 10px; margin-top: 2px; }
        .full-text { color: #e74c3c; }
        .past-text { color: #aaa; }
        .year-scroll { height: 450px; overflow-y: auto; padding-right: 5px; }
        .month-container { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 100px; }
        button.submit-btn { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.submit-btn:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-btn { background: none; border: none; color: #888; cursor: pointer; padding: 0; margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; }
        .success-icon { text-align: center; font-size: 50px; color: #2ecc71; margin-bottom: 10px; }
        .success-title { text-align: center; font-size: 22px; color: var(--primary-color); margin-bottom: 20px; }
        .info-card { background-color: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .info-label { width: 80px; font-weight: bold; color: #666; }
        .info-value { flex: 1; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <span id="loading-text">連線至雲端系統中...</span>
    </div>

    <header>VIVI PILATES</header>

    <div id="page-home" class="page active">
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">
            請選擇您欲預約的日期<br>
            <span style="font-size: 12px; color: var(--primary-color);">時段：每日 5:00 PM - 6:00 PM (上限 3 人)</span>
        </p>
        <div class="year-scroll" id="calendar-container"></div>
    </div>

    <div id="page-form" class="page">
        <button class="back-btn" onclick="goToPage('page-home')">← 返回日曆</button>
        <h2 style="margin-top:0;">填寫預約資訊</h2>
        <div style="background-color: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;">
            <strong>預約日期：</strong> <span id="display-date"></span><br>
            <strong>預約時間：</strong> 5:00 PM - 6:00 PM
        </div>

        <form id="booking-form" onsubmit="submitForm(event)">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" required placeholder="請輸入您的姓名">
            </div>
            <div class="form-group">
                <label for="phone">電話</label>
                <input type="tel" id="phone" required placeholder="請輸入您的聯絡電話">
            </div>
            <div class="form-group">
                <label for="notes">備註 (Notes)</label>
                <textarea id="notes" placeholder="有無特殊身體狀況或其他需求..."></textarea>
            </div>
            <button type="submit" id="submit-btn" class="submit-btn">確認預約</button>
        </form>
    </div>

    <div id="page-success" class="page">
        <div class="success-icon">✓</div>
        <div class="success-title">預約成功！</div>
        <p style="text-align: center; font-size: 14px; color: #666; margin-bottom: 20px;">
            期待在 VIVI PILATES 見到您。<br>以下是您的預約明細：
        </p>
        
        <div class="info-card">
            <div class="info-row"><div class="info-label">時間</div><div class="info-value" id="result-time"></div></div>
            <div class="info-row"><div class="info-label">姓名</div><div class="info-value" id="result-name"></div></div>
            <div class="info-row"><div class="info-label">電話</div><div class="info-value" id="result-phone"></div></div>
            <div class="info-row"><div class="info-label">備註</div><div class="info-value" id="result-notes"></div></div>
        </div>

        <button class="submit-btn" onclick="finishBooking()">返回首頁</button>
    </div>
</div>

<script>
    // ！！！！請在這裡填入您剛剛複製的 Google Web App 網址！！！！
    const API_URL = "https://script.google.com/macros/s/AKfycbwNW4YYWpuJezwaINSOB0agY4V6dbtNp4e01J5MNdZo6cWwthk1ieV8m2ja867C5v-hrQ/exec";
    
    const MAX_PEOPLE = 3;
    let selectedDateStr = "";
    let cloudBookingData = {}; // 雲端抓下來的資料

    function showLoading(text) {
        document.getElementById('loading-text').innerText = text;
        document.getElementById('loading-overlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function goToPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // 從 Google Sheets 獲取最新預約人數
    async function fetchBookings() {
        showLoading("正在獲取最新預約狀態...");
        try {
            const response = await fetch(API_URL + "?t=" + new Date().getTime());
            cloudBookingData = await response.json();
            renderCalendar();
        } catch (error) {
            alert("獲取資料失敗，請確認網路連線。");
            console.error(error);
        } finally {
            hideLoading();
        }
    }

    // 渲染日曆
    function renderCalendar() {
        const container = document.getElementById('calendar-container');
        container.innerHTML = ''; // 清空重新渲染
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonthIndex = today.getMonth(); 
        const currentDate = today.getDate();
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

        for (let i = 0; i < 12; i++) {
            const targetDate = new Date(currentYear, currentMonthIndex + i, 1);
            const renderYear = targetDate.getFullYear();
            const renderMonth = targetDate.getMonth(); 

            const monthContainer = document.createElement('div');
            monthContainer.className = 'month-container';

            const monthHeader = document.createElement('div');
            monthHeader.className = 'month-header';
            monthHeader.innerText = `${renderYear}年 ${renderMonth + 1}月`;
            monthContainer.appendChild(monthHeader);

            const grid = document.createElement('div');
            grid.className = 'calendar-grid';

            weekdays.forEach(day => {
                const dayEl = document.createElement('div');
                dayEl.className = 'weekday';
                dayEl.innerText = day;
                grid.appendChild(dayEl);
            });

            const firstDay = new Date(renderYear, renderMonth, 1).getDay();
            const daysInMonth = new Date(renderYear, renderMonth + 1, 0).getDate();

            for (let j = 0; j < firstDay; j++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateKey = `${renderYear}-${String(renderMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const isPastDate = (renderYear === currentYear && renderMonth === currentMonthIndex && day < currentDate);
                
                // 從雲端資料計算剩餘人數
                const currentBookings = cloudBookingData[dateKey] || 0;
                const remaining = MAX_PEOPLE - currentBookings;

                if (isPastDate) {
                    cell.className = 'day-cell past';
                    cell.innerHTML = `<div>${day}</div><div class="status-text past-text">已過期</div>`;
                } else if (remaining <= 0) {
                    cell.className = 'day-cell full';
                    cell.innerHTML = `<div>${day}</div><div class="status-text full-text">已額滿</div>`;
                } else {
                    cell.className = 'day-cell';
                    cell.innerHTML = `<div>${day}</div><div class="availability">剩 ${remaining} 位</div>`;
                    cell.onclick = () => selectDate(dateKey, renderYear, renderMonth + 1, day);
                }
                
                grid.appendChild(cell);
            }
            monthContainer.appendChild(grid);
            container.appendChild(monthContainer);
        }
    }

    function selectDate(dateKey, year, month, day) {
        selectedDateStr = dateKey;
        document.getElementById('display-date').innerText = `${year}年 ${month}月 ${day}日`;
        document.getElementById('booking-form').reset();
        goToPage('page-form');
    }

    // 將資料傳送至 Google Sheets
    async function submitForm(event) {
        event.preventDefault(); 
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        showLoading("正在送出預約資料...");

        const payload = {
            date: selectedDateStr,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            notes: document.getElementById('notes').value
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            // 成功後準備畫面資料
            document.getElementById('result-time').innerText = `${selectedDateStr} (5:00 PM - 6:00 PM)`;
            document.getElementById('result-name').innerText = payload.name;
            document.getElementById('result-phone').innerText = payload.phone;
            document.getElementById('result-notes').innerText = payload.notes || '無';

            goToPage('page-success');
        } catch (error) {
            alert("預約失敗，請稍後再試。");
            console.error(error);
        } finally {
            hideLoading();
            btn.disabled = false;
        }
    }

    function finishBooking() {
        // 完成預約後返回首頁，重新向雲端抓取最新資料以更新人數
        fetchBookings();
        goToPage('page-home');
    }

    // 網頁載入時立刻向雲端要資料
    window.onload = () => {
        fetchBookings();
    };
</script>
</body>
</html>
